spring:
  application:
    name: sistema-biblioteca

  # Configuração do banco de dados H2 (em memória)
  datasource:
    url: jdbc:h2:mem:bibliotecadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # Console do H2 ativo em localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # Configuração JPA
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop   # Cria as tabelas ao iniciar, apaga ao encerrar
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Popular o banco com dados iniciais
  sql:
    init:
      mode: always

server:
  port: 8080

logging:
  level:
    com.biblioteca: DEBUG
    org.hibernate.SQL: DEBUG
